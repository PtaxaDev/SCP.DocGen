<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCP Document Generator</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="index.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container">
  <!-- Левая панель - только инструменты -->
  <div class="tools-panel">
    <h2><i class="fas fa-tools"></i> Инструменты</h2>

    <!-- МЕТАДАННЫЕ -->
    <div class="tool-section">
      <label><i class="fas fa-tag"></i> МЕТАДАННЫЕ</label>
      <div class="tool-row">
        <input type="text" id="item" placeholder="SCP-173" value="SCP-173">
        <select id="class">
          <option>Safe</option>
          <option selected>Euclid</option>
          <option>Keter</option>
          <option>Thaumiel</option>
          <option>Apollyon</option>
          <option>Neutralized</option>
        </select>
      </div>
      
      <!-- ДАТА -->
      <div class="tool-row" style="margin-top: 8px;">
        <input type="text" id="date" placeholder="Дата" value="22.03.2026">
      </div>
      
      <!-- АВТОР -->
      <div class="tool-row" style="margin-top: 8px;">
        <input type="text" id="author" placeholder="Автор" value="Доктор ███████">
      </div>
    </div>

    <!-- ФОРМАТИРОВАНИЕ -->
    <div class="tool-section">
      <label><i class="fas fa-font"></i> ФОРМАТИРОВАНИЕ</label>
      <div class="tool-buttons">
        <button onclick="wrapText('**', '**')" title="Жирный текст"><i class="fas fa-bold"></i></button>
        <button onclick="wrapText('*', '*')" title="Курсив"><i class="fas fa-italic"></i></button>
        <button onclick="addRedaction()" title="Заредачировать"><i class="fas fa-marker"></i> ███</button>
      </div>
    </div>

    <!-- КАТЕГОРИИ -->
    <div class="tool-section">
      <label><i class="fas fa-layer-group"></i> КАТЕГОРИИ</label>
      <div class="tool-row">
        <input type="text" id="newCategory" placeholder="Название категории" class="tool-input">
        <button onclick="addCategory()" class="tool-btn" style="padding: 8px 12px;">
          <i class="fas fa-plus"></i> Добавить
        </button>
      </div>
      <div id="categories-list" class="categories-list">
        <!-- Категории будут добавляться сюда -->
      </div>
    </div>

    <!-- ИЗОБРАЖЕНИЯ -->
    <div class="tool-section">
      <label><i class="fas fa-image"></i> ИЗОБРАЖЕНИЯ</label>
      <div class="image-upload-controls">
        <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('imageUpload').click()" class="tool-btn">
          <i class="fas fa-upload"></i> Выбрать
        </button>
        <input type="text" id="imageName" placeholder="Название" class="tool-input">
      </div>
      <div class="tool-buttons">
        <button onclick="uploadImage()" class="primary-btn">
          <i class="fas fa-cloud-upload-alt"></i> Загрузить
        </button>
        <button onclick="showImageLibrary()" class="tool-btn">
          <i class="fas fa-images"></i> Библиотека (<span id="imageCount">0</span>)
        </button>
      </div>
      <div class="tool-hint">
        <code>[img:название]</code>
      </div>
    </div>

    <!-- ЭКСПОРТ -->
    <div class="tool-section">
      <label><i class="fas fa-download"></i> ЭКСПОРТ</label>
      <div class="tool-buttons">
        <button onclick="generatePDF()" class="primary-btn">
          <i class="fas fa-file-pdf"></i> Скачать PDF
        </button>
        <button onclick="clearAll()" class="danger-btn">
          <i class="fas fa-trash-alt"></i> Очистить
        </button>
      </div>
    </div>

    <!-- ПОДСКАЗКИ -->
    <div class="tool-section">
      <label><i class="fas fa-question-circle"></i> ПОДСКАЗКИ</label>
      <div class="tool-hint">
        <p>• **текст** - жирный</p>
        <p>• *текст* - курсив</p>
        <p>• [img:name] - вставка фото</p>
        <p>• Двойной клик по редакции - удалить</p>
        <p>• Заголовки и метаданные не редактируются</p>
      </div>
    </div>
  </div>

  <!-- Правая панель - редактируемый документ -->
  <div class="document-wrapper">
    <div id="document" class="document">
      <!-- Шапка документа (НЕ РЕДАКТИРУЕТСЯ) -->
      <!-- Шапка документа (НЕ РЕДАКТИРУЕТСЯ) -->
      <div class="header" contenteditable="false">
        <div class="logo" id="logo-container">
          <img id="logo-image" src="img/logo.png" alt="SCP Foundation Logo" onerror="this.style.display='none'">
          <div id="logo-text">
            <p class="scp-part">SCP</p>
            <p class="foundation-part">FOUNDATION</p>
            <!-- Девиз SCP (СТАТИЧНЫЙ, НЕ МЕНЯЕТ ЦВЕТ) -->
            <div class="scp-motto" contenteditable="false">
              <span class="motto-part">Secure</span>
              <span class="motto-part">Contain</span>
              <span class="motto-part">Protect</span>
            </div>
          </div>
        </div>
        <div class="meta">
          <div><b>Объект #:</b> <span id="p_item" class="meta-static">SCP-173</span></div>
          <div><b>Класс объекта:</b> <span id="p_class" class="meta-static">Euclid</span></div>
          <div><b>Дата:</b> <span id="p_date" class="meta-static">22.03.2026</span></div>
          <div><b>Автор:</b> <span id="p_author" class="meta-static">Доктор ███████</span></div>
        </div>
      </div>
      
      <!-- Контейнер для пользовательских категорий -->
      <div id="custom-categories-container"></div>
    </div>
  </div>
</div>

<script src="index.js"></script>

</body>
</html>
